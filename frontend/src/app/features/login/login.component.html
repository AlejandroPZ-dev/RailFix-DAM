<section class="login-page">
  <div class="login-language">
    <label>
      <span>{{ 'layout.language' | translate }}</span>
      <select [ngModel]="currentLanguage" (ngModelChange)="setLanguage($event)">
        <option *ngFor="let language of languages" [value]="language">
          {{ ('languages.' + language) | translate }}
        </option>
      </select>
    </label>
  </div>

  <section class="card">
    <header>
      <h2>{{ 'login.title' | translate }}</h2>
      <p>{{ 'login.subtitle' | translate }}</p>
    </header>

    <form [formGroup]="loginForm" (ngSubmit)="submit()">
      <label>
        <span class="field-label required">{{ 'login.username' | translate }}</span>
        <input type="text" formControlName="username" [class.invalid-field]="loginForm.controls.username.touched && loginForm.controls.username.invalid">
        <small class="field-error" *ngIf="loginForm.controls.username.touched && loginForm.controls.username.hasError('required')">
          {{ 'common.requiredField' | translate }}
        </small>
      </label>

      <label>
        <span class="field-label required">{{ 'login.password' | translate }}</span>
        <input type="password" formControlName="password" [class.invalid-field]="loginForm.controls.password.touched && loginForm.controls.password.invalid">
        <small class="field-error" *ngIf="loginForm.controls.password.touched && loginForm.controls.password.hasError('required')">
          {{ 'common.requiredField' | translate }}
        </small>
      </label>

      <button type="submit" [disabled]="isSubmitting">
        {{ 'login.submit' | translate }}
      </button>
    </form>
  </section>
</section>
